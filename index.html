<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2Pick</title>
<style>
  :root {
    --bg:#0f1117; --panel:#1a1d27; --panel2:#232734; --border:#333949;
    --text:#e6e8ee; --muted:#9aa0b0; --accent:#5b8cff; --accent2:#7c5bff;
  }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
    display:flex; align-items:center; justify-content:center; }
  .wrap { width:100%; max-width:560px; padding:32px 16px 60px; }
  h1 { font-size:30px; margin:0 0 4px; text-align:center; }
  .sub { color:var(--muted); font-size:14px; text-align:center; margin-bottom:28px; }
  .menu { display:flex; flex-direction:column; gap:16px; }
  .menu-btn {
    display:block; text-decoration:none; color:var(--text);
    background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:22px 20px;
    transition:border-color .15s, transform .1s;
  }
  .menu-btn:hover { border-color:var(--accent); transform:translateY(-2px); }
  .menu-btn .t { font-size:20px; font-weight:700; }
  .menu-btn .d { font-size:13px; color:var(--muted); margin-top:4px; }
  .menu-btn.normal { background:linear-gradient(135deg, rgba(91,140,255,.14), var(--panel)); }
  .menu-btn.limited { background:linear-gradient(135deg, rgba(124,91,255,.14), var(--panel)); }
  .badge { display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; margin-left:8px; vertical-align:middle; }
  .badge.n { background:var(--accent); color:#fff; }
  .badge.l { background:var(--accent2); color:#fff; }
  .foot { text-align:center; color:var(--muted); font-size:12px; margin-top:24px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎴 2Pick</h1>
  <div class="sub">遊ぶモードを選んでください</div>
  <div class="menu">
    <a class="menu-btn normal" href="./standard/">
      <div class="t">通常<span class="badge n">NORMAL</span></div>
      <div class="d">弾を選んでドラフト（第1〜8弾）。直近4弾から提示されます。</div>
    </a>
    <a class="menu-btn limited" href="./image.html">
      <div class="t">期間限定<span class="badge l">LIMITED</span></div>
      <div class="d">アニバーサリー等の特別フォーマット。まずフォーマットを選択します。</div>
    </a>
  </div>
  <div class="foot">2枚×2セットから選んでデッキ40枚を組む Shadowverse 風 2Pick</div>
</div>
</body>
</html>
